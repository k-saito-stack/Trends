name: Daily Batch

on:
  schedule:
    # JST 07:00 = UTC 22:00 (previous day)
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD or 'today')"
        required: false
        default: "today"

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-batch
  cancel-in-progress: false

jobs:
  batch-run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Install Chromium for TikTok regional fetch
        run: |
          python -m playwright install --with-deps chromium

      - name: Run daily batch
        env:
          PYTHONPATH: .
          PYTHONUNBUFFERED: "1"
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SA_JSON }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.date || 'today' }}
          BATCH_ALLOW_RERUN_COMPLETED: ${{ github.event_name == 'workflow_dispatch' }}
          BATCH_RESULT_PATH: /tmp/batch_result.json
        run: |
          status=0
          for attempt in 1 2; do
            xvfb-run -a python -m batch.run --date "${TARGET_DATE}"
            status=$?
            if [ "${status}" -eq 0 ]; then
              exit 0
            fi

            if [ "${attempt}" -ge 2 ]; then
              exit "${status}"
            fi

            echo "Daily batch failed on attempt ${attempt}; retrying in 20 seconds..."
            sleep 20
          done

      - name: Notify connector failures
        if: always()
        run: |
          RESULT_FILE="/tmp/batch_result.json"
          if [ ! -f "${RESULT_FILE}" ]; then
            echo "No batch result file found, skipping connector check."
            exit 0
          fi

          FAILED=$(python3 -c "
          import json, sys
          with open('${RESULT_FILE}') as f:
              data = json.load(f)
          failed = data.get('failed_sources', [])
          if failed:
              print('\n'.join(failed))
          " 2>/dev/null || true)

          if [ -z "${FAILED}" ]; then
            echo "All connectors OK."
            exit 0
          fi

          echo "Failed connectors detected: ${FAILED}"

          BODY=$(python3 -c "
          import json
          with open('${RESULT_FILE}') as f:
              data = json.load(f)
          lines = ['The following connectors failed during the daily batch:\n']
          for sid in data.get('failed_sources', []):
              info = data['sources'].get(sid, {})
              err = info.get('error', 'unknown error')
              lines.append(f'- **{sid}**: {err}')
          lines.append(f'\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}')
          lines.append(f'Date: ${TARGET_DATE}')
          lines.append('\nThis may indicate a page structure change (HTML scraping) or an API issue.')
          lines.append('Check the connector and fix if needed.')
          print('\n'.join(lines))
          ")

          gh issue create \
            --title "Connector failure: ${FAILED}" \
            --body "${BODY}" \
            --label "connector-failure" \
            || echo "Failed to create connector-failure issue; continuing without annotation."
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_DATE: ${{ github.event.inputs.date || 'today' }}

      - name: Create issue on batch failure
        if: failure()
        run: |
          gh issue create \
            --title "Daily Batch Failed: ${TARGET_DATE}" \
            --body "Batch run failed.\n\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\nDate: ${TARGET_DATE}\nTriggered: ${EVENT_NAME}" \
            --label "batch-failure" \
            || echo "Failed to create batch-failure issue; continuing without annotation."
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_DATE: ${{ github.event.inputs.date || 'today' }}
          EVENT_NAME: ${{ github.event_name }}
