name: Daily Batch

on:
  schedule:
    # JST 07:00 = UTC 22:00 (previous day)
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD or 'today')"
        required: false
        default: "today"

permissions:
  contents: read

concurrency:
  group: daily-batch
  cancel-in-progress: false

jobs:
  batch-run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install --require-hashes -r requirements.lock.txt

      - name: Validate target date input
        env:
          TARGET_DATE: ${{ github.event.inputs.date || 'today' }}
        run: |
          if [ "${TARGET_DATE}" != "today" ] && ! [[ "${TARGET_DATE}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid TARGET_DATE: ${TARGET_DATE}"
            exit 1
          fi

      - name: Install Chromium for TikTok regional fetch
        run: |
          python -m playwright install --with-deps chromium

      - name: Run daily batch
        env:
          PYTHONPATH: .
          PYTHONUNBUFFERED: "1"
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SA_JSON }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.date || 'today' }}
          BATCH_ALLOW_RERUN_COMPLETED: ${{ github.event_name == 'workflow_dispatch' }}
          BATCH_RESULT_PATH: /tmp/batch_result.json
        run: |
          status=0
          for attempt in 1 2; do
            xvfb-run -a python -m batch.run --date "${TARGET_DATE}"
            status=$?
            if [ "${status}" -eq 0 ]; then
              exit 0
            fi

            if [ "${attempt}" -ge 2 ]; then
              exit "${status}"
            fi

            echo "Daily batch failed on attempt ${attempt}; retrying in 20 seconds..."
            sleep 20
          done

      - name: Summarize connector failures
        if: always()
        run: |
          RESULT_FILE="/tmp/batch_result.json"
          if [ ! -f "${RESULT_FILE}" ]; then
            echo "No batch result file found, skipping connector summary."
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os

          result_file = "/tmp/batch_result.json"
          with open(result_file, encoding="utf-8") as handle:
              data = json.load(handle)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if not summary_path:
              raise SystemExit(0)

          failed = data.get("failed_sources", [])
          with open(summary_path, "a", encoding="utf-8") as handle:
              handle.write("## Daily Batch Summary\n")
              if not failed:
                  handle.write("- All connectors succeeded.\n")
              else:
                  handle.write("- Failed connectors:\n")
                  for source_id in failed:
                      info = data.get("sources", {}).get(source_id, {})
                      error = str(info.get("error", "")).strip()
                      error_type = str(info.get("metadata", {}).get("errorType", "")).strip()
                      if error_type:
                          handle.write(f"  - `{source_id}` (`{error_type}`)\n")
                      elif error:
                          handle.write(f"  - `{source_id}`\n")
                      else:
                          handle.write(f"  - `{source_id}`\n")
                  handle.write("\n")
              write_ops = data.get("writeOpsEstimate")
              if write_ops is not None:
                  handle.write(f"- Estimated Firestore writes: `{write_ops}`\n")
              rollout = data.get("rolloutStatus") or {}
              if rollout:
                  handle.write(f"- Rollout state: `{rollout.get('decision', 'unknown')}`\n")
          PY

      - name: Summarize batch failure
        if: failure()
        env:
          TARGET_DATE: ${{ github.event.inputs.date || 'today' }}
        run: |
          {
            echo "## Batch Failure"
            echo "- Date: \`${TARGET_DATE}\`"
            echo "- Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Inspect the workflow logs and step summary for details."
          } >> "${GITHUB_STEP_SUMMARY}"
