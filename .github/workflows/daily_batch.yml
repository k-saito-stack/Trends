name: Daily Batch

on:
  schedule:
    # JST 07:00 = UTC 22:00 (previous day)
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD or 'today')"
        required: false
        default: "today"

concurrency:
  group: daily-batch
  cancel-in-progress: false

jobs:
  batch-run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run daily batch
        env:
          PYTHONPATH: .
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SA_JSON }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.date || 'today' }}
        run: |
          python -m batch.run --date "${TARGET_DATE}"

      - name: Create issue on failure
        if: failure()
        run: |
          gh issue create \
            --title "Daily Batch Failed: ${TARGET_DATE}" \
            --body "Batch run failed.\n\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\nDate: ${TARGET_DATE}\nTriggered: ${EVENT_NAME}" \
            --label "batch-failure"
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_DATE: ${{ github.event.inputs.date || 'today' }}
          EVENT_NAME: ${{ github.event_name }}
