name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check packages/ batch/ tests/ scripts/

      - name: Type check (mypy)
        run: mypy packages/ batch/ --ignore-missing-imports

      - name: Test (pytest)
        run: pytest tests/ -v --tb=short
